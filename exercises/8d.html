<!DOCTYPE html>
<html>
  <head>
    <title>Display Practice</title>
    <style>
      .first-field,
      .last-field,
      .email-field{
        padding: 8px 0 8px 10px;
        font-size: 17px;
        border-radius: 7px;
        border: 1px solid gray;
      }

      .first-field,
      .last-field{
        width: 150px;
      }

      .email-field,
      .sign-up-button{
        display: block;
        margin-top: 10px;
      }

      .email-field{
        width: 315px;
      }

      .sign-up-button{
        padding: 8px 0 8px 10px;
        font-size: 17px;
        border-radius: 7px;
        border: none;
        color: white;
        background-color: rgb(7, 76, 133);
        width: 325px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <input class="first-field" type="text" placeholder="First name">
    <input class="last-field" type="text" placeholder="Last name">
    <input class="email-field" type="email" placeholder="Email">
    <button class="sign-up-button">Sign Up</button>
  </body>
</html>
