<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexBox Practice</title>
  <style>
    body,
    P{
      font-family: Arial;
    }

    p{
      margin: 0;
    }
    .profile-picture{
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 25px;
      cursor: pointer;
    }

    .parent-container{
      width: 350px;
    }

    .user{
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 20px;
    }

    .details{
      display: flex;
      align-items: start;
    }

    .username{
      margin-left: 15px;
    }

    .user-name{
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 3px;
    }
    .user-desc{
      margin-bottom: 3px;
    }

    .user-desc,
    .fame{
      color: rgb(96,96,96);
    }

    .fame{
      font-size: 14px;
    }

    .follow-button{
      color: white;
      border: none;
      background-color: rgb(28, 158, 209);
      padding: 7px 10px;
      border-radius: 3px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="parent-container">
       <div class="user">
      <div class="details">
        <div class="user-picture">
            <img class="profile-picture" src="cat.jpg" alt="">
        </div>
        <div class="username">
          <p class="user-name">Oliver</p>
          <p class="user-desc">the cat</p>
          <p class="fame">popular</p>
        </div>
        
      </div>
      <div class="follow">
        <button class="follow-button">Follow</button>
      </div>
    </div>



     <div class="user">
      <div class="details">
        <div class="user-picture">
            <img class="profile-picture" src="cat2.jpg" alt="">
        </div>
        <div class="username">
          <p class="user-name">Mimi</p>
          <p class="user-desc">Sleepy Cat</p>
          <p class="fame">popular</p>
        </div>
        
      </div>
      <div class="follow">
        <button class="follow-button">Follow</button>
      </div>
    </div>



     <div class="user">
      <div class="details">
        <div class="user-picture">
            <img class="profile-picture" src="dog.jpg" alt="">
        </div>
        <div class="username">
          <p class="user-name">Rex</p>
          <p class="user-desc">Happy Bulldog</p>
          <p class="fame">popular</p>
        </div>
        
      </div>
      <div class="follow">
        <button class="follow-button">Follow</button>
      </div>
    </div>
  </div>
   
</body>
</html>
