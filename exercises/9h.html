<!DOCTYPE html>
<html>
  <head>
    <title>Display Practice</title>
    <style>
      body{
        font-family: Arial;
        margin: 0;
      }
      .search-bar{
        width: 400px;
        padding: 8px 0 8px 15px;
        border: none;
        box-shadow: 5px 5px 10px rgba(0,0,0,0.15);
        border-radius: 20px;
        margin-bottom: 30px;
      }

      .google-logo{
        width: 120px;
        cursor: pointer;
        margin-bottom: 10px;
        margin-top: 10px;
      }

      .logo,
      .search-text,
      .buttons{
        text-align: center;
      }

      .search-button,
      .lucky{
        border: none;
        font-weight: bold;
        padding: 8px 15px;
        cursor: pointer;
        background-color: rgb(211, 208, 208);
      }

      .search-button{
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <div class="logo">
        <img class="google-logo" src="google-logo.png">
    </div>
    <div class="search-text">
      <input class="search-bar" type="text" placeholder="Search Google or type a URL">
    </div>
    
    <div class="buttons">
      <button class="search-button">
        Google Search
      </button>
      <button class="lucky">
        I'm Feeling Lucky
      </button>
    </div>

  </body>

</html>
