<!DOCTYPE html>
<html>
  <head>
    <title>Textbox Practice</title>
    <style>
      p{
        font-family: Arial;
        margin-top: 0;
        margin-bottom: 0;
      }

      .email{
        color: gray;
        font-size: 14px;
        margin-bottom: 8px;
      }

      .email-field{
        padding: 5px 0px 5px 8px;
        width: 300px;
        margin-bottom: 15px;
      }

      .terms{
        font-size: 14px;
        color: gray;
        margin-bottom: 15px;
      }

      .join-button{
        color: white;
        background-color: rgba(32, 3, 138, 0.856);
        border: none;
        text-align: center;
        padding: 13px 120px;
        border-radius: 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <p class="email">Email</p>
    <input class="email-field" type="email">
    <p class="terms">By clicking & Join, you agree to the Privacy Policy.</p>
    <button class="join-button">Agree & Join</button>
  </body>
</html>
