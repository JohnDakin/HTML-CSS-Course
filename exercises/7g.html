<!DOCTYPE html>
<html>
  <head>
    <title>TextBox Practice</title>
    <style>
      img,input,button{
        margin-top: 0;
        margin-bottom: 0;
        vertical-align: middle;
      }
      .cat-image{
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 20px;
        margin-right: 8px;
      }

      .tweet-space{
        padding: 8px 5px 8px 10px;
        width: 250px;
        border: none;
        border-radius: 15px;
        margin-right: 8px;
      }

      .tweet-button{
        color: white;
        background-color: rgb(9, 109, 148);
        border: none;
        padding: 8px 15px;
        border-radius: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <img class="cat-image" src="cat.jpg">
    <input class="tweet-space" type="text" placeholder="What's happening?">
    <button class="tweet-button">Tweet</button>
  </body>
</html>
