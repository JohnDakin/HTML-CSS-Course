<!DOCTYPE html>
<html>
  <head>
    <title>Display Practice</title>
    <style>
      .response{
        width: 210px;
        display: inline-block;
      }

      .yes-button,
      .no-button{
        cursor: pointer;
      }

      .response,
      .yes-button,
      .no-button{
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <p class="response">Thanks for chatting with our customer support. Would you like to take our quick survey?
    </p>
    <button class="yes-button">Yes</button>
    <button class="no-button">No</button>
  </body>
</html>
