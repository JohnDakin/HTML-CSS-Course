<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position Absolute and Relative Exercise</title>
  <style>
    body{
      font-family: Arial;
      height: 3000px;
    }

    .image{
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .container{
      position: relative;
      width: 200px;
      height: 200px;
    }

    .offer{
      position: absolute;
      background-color: black;
      color: white;
      font-size: 15px;
      padding: 5px 8px;
      right: 0;
      top: 8px;
    }

    .footer-container{
      position: absolute;
      height: 55px;
      background-color: rgba(255, 255, 255, 0.8);
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .add-button{
      padding: 5px 10px;
      border: 1px solid rgb(96,96,96);
      background-color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="image" src="shirt.jpg" alt="">
    <div class="offer">
      20% OFF
    </div>
    <div class="footer-container">
      <button class="add-button">Add to Cart</button>
    </div>
  </div>
</body>
</html>
