<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position Absolute and Relative Exercise</title>
</head>
<body style=" height: 3000px;">
  <div style="
    position: fixed;
    width: 320px;
    height: 180px;
    background-color: gray;
    bottom: 5px;
    right: 10px;
    ">
    <div style="
      font-size: 25px;
      font-family: Arial;
      background-color: black;
      color: white;
      position: absolute;
      padding: 1px 8px;
      border-radius: 15px;
      top: -15px;
      left: -15px;
    ">x</div>
    </div>
</body>
</html>
