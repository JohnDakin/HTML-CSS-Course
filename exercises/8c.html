<!DOCTYPE html>
<html>
  <head>
    <title>Display Practice</title>
    <style>
      .search-bar{
        width: 350px;
        padding: 8px 0 8px 15px;
        border: none;
        box-shadow: 5px 5px 10px rgba(0,0,0,0.15);
        border-radius: 20px;
      }

      .google-logo{
        width: 120px;
        display: block;
        margin-left: 120px;
        cursor: pointer;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <img class="google-logo" src="google-logo.png">
    <input class="search-bar" type="text" placeholder="Search Google or type a URL">
  </body>

</html>
