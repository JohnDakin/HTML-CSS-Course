<!DOCTYPE html>
<html>
  <head>
    <title>Div Practice</title>
    <style>
      p{
        font-family: Arial;
        margin: 0;
      }

      .install-statement{
        font-weight: bold;
        font-size: 19px;
        margin-bottom: 7px;
        color: white;
      }

      .add-statement{
        width: 340px;
        color: gray;
        font-size: 15px;
      }

      .container{
        width: 340px;
        background-color: rgb(29, 28, 28);
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p class="install-statement">Install YouTube Music</p>
      <p class="add-statement">Add YouTube Music to your desktop for quick and easy access</p>
    </div>
  </body>
</html>
